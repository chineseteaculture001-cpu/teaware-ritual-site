backend:
  name: github
  repo: chineseteaculture001-cpu/teaware-ritual-site
  branch: main
  base_url: https://www.thejaderitual.com
  auth_endpoint: api/auth

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "products"
    label: "Products"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    format: "json"
    fields:
      - {label: "Product Name", name: "name", widget: "string"}
      - label: "Category (Determines Page Section)"
        name: "category"
        widget: "select"
        options: 
          - {label: "Gongfu Ceremony Set", value: "Ceremony Set"}
          - {label: "Tea Tray / Accessories", value: "Tea Tray"}
          - {label: "Yixing Zisha Teapot", value: "Teapot"}
          - {label: "Tea - Rock & Oolong", value: "Tea - Rock & Oolong"}
          - {label: "Tea - Green & White", value: "Tea - Green & White"}
          - {label: "Tea - Scented", value: "Tea - Scented"}
          - {label: "Tea - Black & Puer", value: "Tea - Black & Puer"}
      - {label: "Price (USD)", name: "price", widget: "number", value_type: "float", default: 0}
      - {label: "Image URL", name: "image", widget: "image"}
      - {label: "Description", name: "body", widget: "markdown"}

  - name: "blog"
    label: "Journal/Blog"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Featured Image", name: "image", widget: "image"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "settings"
    label: "Site Settings"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "General Settings"
        file: "content/settings.json"
        fields:
          - {label: "Hero Title", name: "hero_title", widget: "string"}
          - {label: "Hero Subtitle", name: "hero_subtitle", widget: "string"}
          - {label: "YouTube Video ID", name: "video_id", widget: "string", hint: "e.g. fA_X8D1Tj10"}
          - {label: "WhatsApp Number", name: "whatsapp", widget: "string"}
          - {label: "Contact Email", name: "email", widget: "string"}
